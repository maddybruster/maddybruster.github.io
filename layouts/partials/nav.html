<nav class="site-nav">
	<a class="site-title" href="{{ .Site.BaseURL }}">maddy bruster</a>
	<div class="nav-groups">
		<div class="nav-controls">
			{{ $currentView := "" }}
			{{ if not .IsHome }}
				{{ if eq .Section "life" }}
					{{ $currentView = "view-life" }}
				{{ else }}
					{{ $currentView = "view-work" }}
				{{ end }}
			{{ end }}
			<label class="nav-toggle">
				<input type="checkbox" data-target="view-life"{{ if eq $currentView "view-life" }} checked{{ end }} />
				life
			</label>
			<label class="nav-toggle">
				<input type="checkbox" data-target="view-work"{{ if eq $currentView "view-work" }} checked{{ end }} />
				work
			</label>
		</div>
		<div class="nav-links">
			<a class="nav-icon" href="https://www.are.na/maddy-bruster" target="_blank" rel="noopener">
				<img src="/files/arena.png" alt="Are.na" />
			</a>
			<a class="nav-swatch" href="https://special.fish/maddy" target="_blank" rel="noopener" aria-label="Special Fish"></a>
			<a href="#about">about</a>
			<a href="mailto:info@maddybruster.com">email me</a>
		</div>
	</div>
</nav>

<script>
	(function() {
		const nav = document.querySelector('.site-nav');
		if (!nav) return;

		function setNavHeight() {
			document.documentElement.style.setProperty('--nav-height', `${nav.offsetHeight}px`);
		}

		window.addEventListener('scroll', function() {
			nav.classList.toggle('is-scrolled', window.scrollY > 10);
		});

		const viewToggles = Array.from(document.querySelectorAll('.nav-toggle input[type="checkbox"]'));
		const isSubPage = !document.getElementById('view-work');

		if (isSubPage) {
			viewToggles.forEach(function(toggle) {
				toggle.addEventListener('change', function() {
					const targetId = this.getAttribute('data-target');
					const state = {};
					viewToggles.forEach(function(t) {
						state[t.getAttribute('data-target')] = t.getAttribute('data-target') === targetId;
					});
					sessionStorage.setItem('navState', JSON.stringify(state));
					window.location.href = '/';
				});
			});
		} else {
			viewToggles.forEach(function(toggle) {
				toggle.addEventListener('change', function() {
					window.scrollTo({ top: 0, behavior: 'smooth' });
				});
			});
		}

		window.addEventListener('load', setNavHeight);
		window.addEventListener('resize', setNavHeight);
		setNavHeight();
	})();
</script>
