---
layout: default
title: stories
permalink: /stories/
---

<div class="story-container inner-max-width col-12">

{% assign stories = site.stories %}
{% for story in stories reversed %}

<div class="story">
    <div class="story-header flex-wrapper flex-row justify-between align-items-center flex-wrap pb-3">
        <h3 class="story-title m-0" itemprop="name headline">{{ story.title }}</h3>
        <p class="date small opacity-50 m-0 z-index-n-1">{{ story.date| date: "%m.%d.%Y" }}</p>
            
    </div>
    <div class="story-content">
        <p>{{ story.content }}</p> 
    </div>
</div>

{% endfor %}

</div>
