---
layout: default
title: words
permalink: /words/
---

<div class="words grid grid-row-gap inner-max-width col-12">

<!-- This loops through the paginated posts -->
{% for post in site.posts %}
    <div class="post-title col-12 flex-wrapper flex-col flex-row-lg align-items-center-lg justify-content-between">

    <h2 class="mb-1 mb-lg-0"><a href="{{ post.url }}">{{ post.title | truncatewords: 15 }}</a></h1>
    <p class="date small opacity-50 m-0 z-index-n-1">{{ post.date| date: "%m.%d.%Y" }}</p>
   
    </div>
    {% endfor %}

    <!-- Pagination links -->
    <div class="pagination col-12">
    {% if paginator.previous_page %}
        <a href="{{ paginator.previous_page_path }}" class="previous">
        Previous
        </a>
    {% endif %}
    {% if paginator.next_page %}
        <a href="{{ paginator.next_page_path }}" class="next">Next</a>
    {% endif %}
    </div>
</div>
